server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: anime-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/anime_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: char

  cache:
    type: jcache
    jcache:
      config: classpath:ehcache.xml

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.animeSite.controller

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-123456789}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

  providers:
    priority: ${PROVIDER_PRIORITY:AnimeSuge,Anineko,GoGoAnime}
    disabled: ${PROVIDER_DISABLED:}
    cache-ttl-seconds: ${PROVIDER_CACHE_TTL:86400}
    failure-cache-ttl-seconds: ${PROVIDER_FAILURE_CACHE_TTL:300}
    identity-confidence-threshold: ${PROVIDER_IDENTITY_THRESHOLD:0.90}
    stream-verification-enabled: ${PROVIDER_STREAM_VERIFY:true}
    max-fallback-attempts: ${PROVIDER_MAX_FALLBACK:3}